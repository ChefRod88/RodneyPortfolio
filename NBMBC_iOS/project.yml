name: NBMBC_iOS
options:
  bundleIdPrefix: com.rcdev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  NBMBC_iOS:
    type: application
    platform: iOS
    sources:
      - NBMBC_iOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.rcdev.nbmbc
      PRODUCT_NAME: RC DEV
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: 5.9
      INFOPLIST_FILE: NBMBC_iOS/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      TARGETED_DEVICE_FAMILY: "1"
      ENABLE_PREVIEWS: YES
    dependencies: []
