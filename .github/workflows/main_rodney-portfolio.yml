# Docs for Cloudflare Wrangler Action: https://github.com/cloudflare/wrangler-action

name: Build and deploy portfolio to Cloudflare - rodney-portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Static Site
        run: python scripts/generate_static_site.py

      - name: Upload wwwroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwwroot
          path: wwwroot/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download wwwroot artifact
        uses: actions/download-artifact@v4
        with:
          name: wwwroot
          path: wwwroot/

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: 'latest'
