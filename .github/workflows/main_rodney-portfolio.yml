name: Build and deploy portfolio to Cloudflare - rodney-portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Test with dotnet
        run: dotnet test tests/RodneyPortfolio.Tests/ --no-build --verbosity normal --configuration Release

      - name: Generate Static HTML
        run: ./scripts/generate_static.sh

      - name: Validate Local Assets
        run: ./scripts/validate_assets.sh dist

      - name: Run SEO & Content Smoke Test
        run: ./scripts/smoke_test.sh dist

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=rodneyportfolio
          wranglerVersion: 'latest'
