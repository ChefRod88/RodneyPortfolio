# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - rodney-portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./.net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F9D68F6AAA8348C592CDA00A8E11035C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A5FA883328F9464DAA0FC5EF4398B814 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4F8C4BACB3374554B7C6FBB11275A135 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          package: ./.net-app

      # REQUIRED: Add OPENAI_API_KEY in GitHub repo Settings → Secrets and variables → Actions
      # webapps-deploy does NOT support app-settings; we use appservice-settings instead.
      - name: Set OpenAI API Key in Azure
        uses: Azure/appservice-settings@v1
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          app-settings-json: '[{"name":"OpenAI__ApiKey","value":"${{ secrets.OPENAI_API_KEY }}","slotSetting":false}]'

      # Optional: Add GA4_MEASUREMENT_ID in GitHub Secrets for visitor tracking. If omitted, GA4 is disabled.
      - name: Set GA4 Measurement ID in Azure
        uses: Azure/appservice-settings@v1
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          app-settings-json: '[{"name":"GoogleAnalytics__MeasurementId","value":"${{ secrets.GA4_MEASUREMENT_ID }}","slotSetting":false}]'

      # Quote form SMTP config for live submissions
      # REQUIRED secret: QUOTE_SMTP_PASSWORD (Google App Password)
      - name: Set Quote SMTP settings in Azure
        uses: Azure/appservice-settings@v1
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          app-settings-json: '[
            {"name":"QuoteEmail__SmtpHost","value":"smtp.gmail.com","slotSetting":false},
            {"name":"QuoteEmail__SmtpPort","value":"587","slotSetting":false},
            {"name":"QuoteEmail__EnableSsl","value":"true","slotSetting":false},
            {"name":"QuoteEmail__SmtpUsername","value":"chefrodneyachery@gmail.com","slotSetting":false},
            {"name":"QuoteEmail__FromEmail","value":"chefrodneyachery@gmail.com","slotSetting":false},
            {"name":"QuoteEmail__ToEmail","value":"chefrodneyachery@gmail.com","slotSetting":false},
            {"name":"QuoteEmail__SmtpPassword","value":"${{ secrets.QUOTE_SMTP_PASSWORD }}","slotSetting":false}
          ]'

      # Stripe payment integration
      # REQUIRED secrets: STRIPE_PUBLISHABLE_KEY, STRIPE_SECRET_KEY
      - name: Set Stripe keys in Azure
        uses: Azure/appservice-settings@v1
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          app-settings-json: '[
            {"name":"Stripe__PublishableKey","value":"${{ secrets.STRIPE_PUBLISHABLE_KEY }}","slotSetting":false},
            {"name":"Stripe__SecretKey","value":"${{ secrets.STRIPE_SECRET_KEY }}","slotSetting":false}
          ]'

      # Azure SQL connection string for client portal
      # REQUIRED secret: PORTAL_DB_CONNECTION_STRING
      - name: Set connection string in Azure
        uses: Azure/appservice-settings@v1
        with:
          app-name: 'rodney-portfolio'
          slot-name: 'Production'
          app-settings-json: '[
            {"name":"ConnectionStrings__PortalDb","value":"${{ secrets.PORTAL_DB_CONNECTION_STRING }}","slotSetting":false}
          ]'
